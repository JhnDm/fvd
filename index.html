<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First Monthsary</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #021d14, #064e3b, #065f46);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #d1fae5;
}

/* PLAYER CARD */
.player {
    background: rgba(6, 78, 59, 0.6);
    padding: 25px;
    border-radius: 20px;
    width: 320px;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(16, 185, 129, 0.25);
    text-align: center;
    border: 1px solid rgba(16, 185, 129, 0.3);
}

/* TITLE */
h1 {
    color: #6ee7b7;
    font-size: 20px;
    margin-bottom: 5px;
}

.subtitle {
    font-size: 13px;
    opacity: 0.8;
    margin-bottom: 20px;
}

/* CONTROLS */
.controls {
    display: flex;
    align-items: center;
    gap: 15px;
}

/* PLAY BUTTON */
button {
    background: linear-gradient(135deg, #10b981, #34d399);
    border: none;
    color: white;
    font-size: 20px;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(52, 211, 153, 0.5);
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px rgba(52, 211, 153, 0.8);
}

/* TEXT */
.info {
    flex: 1;
    text-align: left;
}

.title {
    font-size: 14px;
    margin-bottom: 6px;
    color: #a7f3d0;
}

/* PROGRESS BAR */
.progress-container {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 5px;
    overflow: hidden;
}

#progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #34d399, #6ee7b7);
    box-shadow: 0 0 10px #34d399;
    transition: width 0.2s;
}

/* FOOTER */
.footer {
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.7;
}

/* 🌿 FLOATING LEAVES (instead of hearts 👀) */
.leaf {
    position: fixed;
    bottom: -10px;
    color: #6ee7b7;
    font-size: 16px;
    animation: floatUp 6s linear infinite;
    opacity: 0.7;
}

@keyframes floatUp {
    to {
        transform: translateY(-100vh) rotate(360deg);
        opacity: 0;
    }
}
  
</style>
</head>

<body>

<div class="player">
    <h1>First Monthsary</h1>
    <p class="subtitle">If ever you hear this, it came from my heart 💕</p>

    <div class="controls">
        <button id="playBtn">▶</button>

        <div class="info">
            <div class="title">Record.mp3</div>
            <div class="progress-container">
                <div id="progress"></div>
            </div>
        </div>
    </div>

    

    <audio id="audio" src="./audio/20251128_163831.aac"></audio>
</div>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const progress = document.getElementById("progress");

let isPlaying = false;

// ▶ PLAY / ⏸ PAUSE
playBtn.addEventListener("click", () => {
    if (!isPlaying) {
        audio.play();
        playBtn.textContent = "⏸";
    } else {
        audio.pause();
        playBtn.textContent = "▶";
    }
    isPlaying = !isPlaying;
});

// 📊 PROGRESS BAR
audio.addEventListener("timeupdate", () => {
    if (audio.duration) {
        const percent = (audio.currentTime / audio.duration) * 100;
        progress.style.width = percent + "%";
    }
});

// 💖 FLOATING HEARTS
setInterval(() => {
    const leaf = document.createElement("div");
    leaf.classList.add("leaf");
    leaf.innerText = "🍃";
    leaf.style.left = Math.random() * 100 + "vw";
    leaf.style.fontSize = (Math.random() * 10 + 12) + "px";

    document.body.appendChild(leaf);

    setTimeout(() => leaf.remove(), 6000);
}, 900);
</script>

</body>
</html>
