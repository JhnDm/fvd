<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 1st Monthsary Mixtape 💕</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">
</head>
<body>
    <div class="container">
        <h1>🎵 Our 1st Monthsary Mixtape 🎵</h1>
        
        <div class="cassette" id="cassette">
            <!-- Cassette SVG -->
            <svg viewBox="0 0 500 300" id="cassette-svg">
                <!-- Cassette Body -->
                <rect x="20" y="50" width="460" height="200" rx="15" fill="#1a1a1a" stroke="#333" stroke-width="4"/>
                <rect x="25" y="55" width="450" height="190" rx="10" fill="#2d2d2d" stroke="#444" stroke-width="2"/>
                
                <!-- Reels -->
                <g id="left-reel" class="reel">
                    <circle cx="100" cy="150" r="35" fill="#444" stroke="#555" stroke-width="3"/>
                    <circle cx="100" cy="150" r="25" fill="#666"/>
                    <circle cx="88" cy="138" r="8" fill="#888"/>
                    <circle cx="112" cy="162" r="8" fill="#888"/>
                </g>
                <g id="right-reel" class="reel">
                    <circle cx="400" cy="150" r="35" fill="#444" stroke="#555" stroke-width="3"/>
                    <circle cx="400" cy="150" r="25" fill="#666"/>
                    <circle cx="388" cy="138" r="8" fill="#888"/>
                    <circle cx="412" cy="162" r="8" fill="#888"/>
                </g>
                
                <!-- Windows -->
                <rect x="140" y="90" width="60" height="40" rx="5" fill="#000" stroke="#fff" stroke-width="2"/>
                <rect x="140" y="170" width="60" height="40" rx="5" fill="#000" stroke="#fff" stroke-width="2"/>
                <rect x="300" y="90" width="60" height="40" rx="5" fill="#000" stroke="#fff" stroke-width="2"/>
                <rect x="300" y="170" width="60" height="40" rx="5" fill="#000" stroke="#fff" stroke-width="2"/>
                
                <!-- Labels -->
                <rect x="180" y="120" width="140" height="60" rx="8" fill="#ff69b4" stroke="#fff" stroke-width="3"/>
                <text x="250" y="142" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">Side A</text>
                <text x="250" y="158" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">1st Monthsary</text>
                <text x="250" y="175" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">💕 Love Mixtape 💕</text>
                
                <!-- PLAY BUTTON -->
                <g id="play-button" class="playable">
                    <rect x="210" y="200" width="80" height="50" rx="25" fill="#ff1493" stroke="#fff" stroke-width="4"/>
                    <polygon points="225,210 225,265 245,237.5" fill="#fff" stroke="#fff" stroke-width="2"/>
                    <text x="250" y="255" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">PLAY</text>
                </g>
            </svg>
        </div>
        
        <!-- Audio Player -->
        <audio id="mixtape" preload="auto" loop>
            <source src="audio/love-message.mp3" type="audio/mpeg">
            Your browser doesn't support audio 😢
        </audio>
        
        <!-- Message Popup -->
        <div id="message" class="message">
            <div class="message-content">
                🎵 <strong>Now Playing: "Forever & Always" 💕</strong><br><br>
                Happy 1st monthsary, my love!<br>
                Click <strong>Record</strong> to add your message 👇
                <div class="record-btn" onclick="startRecording()">🎤 Record Voice</div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
